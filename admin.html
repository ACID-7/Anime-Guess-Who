<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Roster Dataset Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div id="login-screen" class="login-wrap">
    <div class="login-box">
      <h1 class="login-title">Admin Login</h1>
      <p class="login-sub">Enter your credentials to manage the roster image dataset.</p>
      <form id="login-form" class="login-form">
        <input
          id="admin-username"
          class="login-input"
          type="text"
          autocomplete="username"
          placeholder="Username"
        />
        <input
          id="admin-password"
          class="login-input"
          type="password"
          autocomplete="current-password"
          placeholder="Password"
        />
        <div id="login-error" class="login-error" aria-live="polite"></div>
        <button type="submit" class="btn login-btn">Log In</button>
      </form>
    </div>
  </div>

  <main id="admin-app" class="admin-wrap" style="display:none">
    <header class="admin-head">
      <h1>Roster Admin</h1>
      <p>Manage franchise rosters, fill missing images, hide unsupported entries, and export a clean dataset JSON for the game.</p>
      <div class="admin-actions">
        <a class="btn ghost" href="index.html">Back to Game</a>
        <button class="btn ghost" id="rebuild-btn">Rebuild from Roster</button>
        <button class="btn" id="add-character-btn">Add Entity</button>
        <button class="btn" id="export-btn">Export Updated Dataset</button>
      </div>
    </header>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Search franchise, entity, or AniList ID..." />
      <select id="anime-filter" class="anime-filter">
        <option value="all">All rosters</option>
      </select>
      <label class="toggle-chip">
        <input id="missing-only-toggle" type="checkbox" />
        Missing only
      </label>
      <div class="stat" id="stats">Loading...</div>
    </section>

    <section id="summary-grid" class="summary-grid"></section>
    <section id="list" class="list"></section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
